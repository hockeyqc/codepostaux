function normalizeFSA(input) {
  const cleaned = input.replace(/[^A-Za-z0-9]/g, '').toUpperCase();
  return cleaned.slice(0, 3);
}

document.getElementById("postal-form").addEventListener("submit", function (e) {
  e.preventDefault();
  const raw = document.getElementById("postal-code").value;
  const prefixe = normalizeFSA(raw);
  const container = document.getElementById("results");
  container.innerHTML = "";

  if (prefixe.length < 3) {
    container.textContent = "Veuillez entrer les 3 premiers caractères de votre code postal (ex. : H3T).";
    return;
  }

  const resultat = data[prefixe];

  if (!resultat || !resultat.ahf || resultat.ahf.length === 0) {
    container.textContent = "Aucune association de hockey féminin trouvée pour ce code postal.";
    return;
  }

  const ahfHeader = document.createElement("h3");
  ahfHeader.textContent = "Hockey féminin";
  container.appendChild(ahfHeader);

  resultat.ahf.forEach(assoc => {
    const link = document.createElement("a");
    link.href = assoc.url;
    link.target = "_blank";
    link.rel = "noopener";
    link.textContent = assoc.nom;
    link.className = "result-link";
    container.appendChild(link);
  });
});

</script>
